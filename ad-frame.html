<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>html,body{margin:0;padding:0;overflow:hidden;background:transparent}</style>
</head>
<body>
  <script>
    (() => {
      const formats = {
        '468x60': { key: 'dfc49ebd2407ec09e0689da4f8a0c34c', width: 468, height: 60 },
        '320x50': { key: '4e485ec0b81fcdb2c2549f73a60b345a', width: 320, height: 50 },
        '728x90': { key: '184e6b9972a56e72cc0c8aca28deb91f', width: 728, height: 90 }
      };
      const size = new URLSearchParams(location.search).get('size');
      const banner = formats[size];
      if (!banner) return;
      document.documentElement.style.width = `${banner.width}px`;
      document.documentElement.style.height = `${banner.height}px`;
      document.body.style.width = `${banner.width}px`;
      document.body.style.height = `${banner.height}px`;
      window.atOptions = { key: banner.key, format: 'iframe', height: banner.height, width: banner.width, params: {} };
      document.write(`<script src="https://www.highperformanceformat.com/${banner.key}/invoke.js"><\/script>`);
    })();
  </script>
</body>
</html>
